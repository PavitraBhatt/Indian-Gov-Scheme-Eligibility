name: Keep alive

# Pings the deployed site every ~10 minutes so the Render free instance doesn't
# spin down — which avoids the ~50s "service waking up" cold-start screen.
# Render free web services sleep after ~15 min of no traffic.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          for i in 1 2 3; do
            code=$(curl -fsS --max-time 90 -o /dev/null -w "%{http_code}" \
              https://schemesaathi-1mea.onrender.com/api/health) && echo "OK $code" && exit 0
            echo "attempt $i failed, retrying..."; sleep 20
          done
          echo "health check did not return success (instance may be waking)"; exit 0
