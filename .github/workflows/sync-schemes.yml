name: Sync schemes from myScheme

# Pulls scheme data from the official source, normalizes it with Claude, diffs
# it against the database, and opens a PR with new/changed schemes for review.
# Nothing is auto-published — a human approves the PR.
on:
  schedule:
    - cron: "0 4 * * 1"   # every Monday 04:00 UTC
  workflow_dispatch:       # allow manual runs from the Actions tab
    inputs:
      max:
        description: "Max schemes to fetch (blank = all)"
        required: false
        default: "25"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run sync (fetch -> normalize -> diff -> apply)
        id: sync
        env:
          MYSCHEME_API_KEY: ${{ secrets.MYSCHEME_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          MAX="${{ github.event.inputs.max || '25' }}"
          python -m scheme_checker.sync.run --max "$MAX" --last-verified "$DATE" --apply
          echo "summary=$(python -c "import json;print(json.load(open('data/_sync_proposal.json'))['summary'])")" >> "$GITHUB_OUTPUT"

      - name: Validate the updated database
        run: pytest tests/test_data.py -q

      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: sync/scheme-updates
          base: master
          title: "data: scheme sync — ${{ steps.sync.outputs.summary }}"
          commit-message: "data: sync schemes from myScheme (${{ steps.sync.outputs.summary }})"
          add-paths: data/schemes_central.json
          body: |
            Automated scheme sync from myScheme (via API Setu), normalized by Claude.

            **${{ steps.sync.outputs.summary }}**

            ⚠️ Review carefully before merging — this data drives real eligibility
            decisions and scam alerts. Check the eligibility rules, benefit amounts,
            and scam notes on each added/changed scheme against the official source.

            🤖 Generated by `.github/workflows/sync-schemes.yml`
          labels: |
            scheme-sync
            needs-review
