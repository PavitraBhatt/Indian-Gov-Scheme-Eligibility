# Render.com blueprint — deploy free with: New > Blueprint > connect this repo.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: schemesaathi
    runtime: docker
    plan: free
    branch: master            # deploy from this branch
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true          # every push to `branch` triggers a fresh deploy
    envVars:
      # Render injects PORT automatically; uvicorn reads it in the Dockerfile CMD.
      - key: PYTHONUNBUFFERED
        value: "1"
      # --- Admin dashboard (/admin) ---
      # Set BOTH in the Render dashboard (Environment tab), not here. The admin
      # dashboard is disabled until ADMIN_PASSWORD is set. SESSION_SECRET keeps
      # you logged in across restarts (any long random string).
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      # Neon (or any Postgres) connection string for durable analytics/logs.
      # Without it, logs use a local SQLite file that resets on free-tier redeploy.
      - key: DATABASE_URL
        sync: false
      # --- optional knobs: uncomment to use ---
      # Allow specific front-end origins to call the API (comma-separated):
      # - key: SCHEME_CORS_ORIGINS
      #   value: "https://schemesaathi.onrender.com"
      # Secrets for the weekly sync pipeline. Do NOT put the value here — set
      # `sync: false` so Render prompts for it in the dashboard and keeps it
      # out of git:
      # - key: ANTHROPIC_API_KEY
      #   sync: false
      # - key: MYSCHEME_API_KEY
      #   sync: false
