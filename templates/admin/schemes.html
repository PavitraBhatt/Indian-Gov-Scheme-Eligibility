{% extends "admin/base.html" %}
{% block title %}Schemes{% endblock %}
{% block heading %}Schemes{% endblock %}
{% block head %}
<script>
  function schemeTable(rows){
    return {
      q: "", rows: rows,
      filtered(){
        const q = this.q.toLowerCase().trim();
        if(!q) return this.rows;
        return this.rows.filter(r =>
          (r.name + " " + r.id + " " + r.category + " " + r.scope).toLowerCase().includes(q));
      },
      rupees(n){ return n ? "Rs " + n.toLocaleString("en-IN") : "—"; }
    };
  }
</script>
{% endblock %}
{% block content %}
<div x-data="schemeTable({{ rows_json | safe }})">
  <div class="flex flex-wrap gap-3 items-center justify-between mb-4">
    <input x-model="q" placeholder="Search schemes…" class="border rounded-lg px-3 py-2 w-64 focus:ring-2 focus:ring-[#14315c]">
    <div class="text-sm text-slate-500"><span x-text="filtered().length"></span> of {{ rows|length }} schemes</div>
    <a href="/admin/schemes/new" class="bg-[#0e7a3b] text-white text-sm font-semibold px-4 py-2 rounded-lg hover:bg-[#0b5f2e]">+ New scheme</a>
  </div>
  <div class="bg-white rounded-xl shadow-sm border overflow-x-auto">
    <table class="w-full text-sm">
      <thead class="bg-slate-50 text-slate-500 text-left">
        <tr><th class="p-3">Name</th><th class="p-3">Category</th><th class="p-3">Scope</th><th class="p-3 text-right">Amount</th><th class="p-3"></th></tr>
      </thead>
      <tbody>
        <template x-for="r in filtered()" :key="r.id">
          <tr class="border-t hover:bg-slate-50">
            <td class="p-3"><div class="font-medium text-slate-800" x-text="r.name"></div><div class="text-xs text-slate-400" x-text="r.id"></div></td>
            <td class="p-3" x-text="r.category"></td>
            <td class="p-3" x-text="r.scope"></td>
            <td class="p-3 text-right" x-text="rupees(r.amount)"></td>
            <td class="p-3 text-right whitespace-nowrap">
              <a :href="'/admin/schemes/'+r.id+'/edit'" class="text-[#14315c] hover:underline">Edit</a>
              <form :action="'/admin/schemes/'+r.id+'/delete'" method="post" class="inline"
                    @submit="return confirm('Delete '+r.name+'? This edits the JSON source.')">
                <button class="text-red-600 hover:underline ml-3">Delete</button>
              </form>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
